name: my-cloud-fastapi-workflow

env:
  python-version: "3.13.5"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-with-flake8:
    runs-on: ubuntu-latest
    steps:
      - name: Load code 
        uses: actions/checkout@v4

      - name: Chose Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{env.python-version}}

      - name: Install and upgrade pip, install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          flake8 . --ignore=D,E501,W293,W291,W292,F401,E302,E305,E225,F403,E126,E251,E128,E402,E231

  test-with-pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Load code
        uses: actions/checkout@v4
      - name: Chose Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{env.python-version}}
      - name: Install and upgrade pip, install pytest and run prerocessing.
        run: |
          python -m pip install --upgrade pip
          pip install httpx
          pip install pytest 
          pip install -e .
          python src/train_model.py

      - name: Run test
        run: |
          python -m pytest

          
